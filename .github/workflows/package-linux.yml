name: Package .deb + .rpm

# Runs after a release is published. Downloads the cargo-dist linux
# tarballs, extracts the binary, and uses nfpm to build .deb + .rpm
# for amd64 + arm64. Includes the .desktop file + icon assets so the
# package integrates with the system app menu.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package (no leading v)"
        required: true

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            triple: x86_64-unknown-linux-gnu
            rpm_arch: x86_64
          - arch: arm64
            triple: aarch64-unknown-linux-gnu
            rpm_arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${{ github.event.release.tag_name }}"
            v="${v#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Download release tarball
        run: |
          v="${{ steps.ver.outputs.version }}"
          triple="${{ matrix.triple }}"
          url="https://github.com/${{ github.repository }}/releases/download/v${v}/tmnl-rs-${triple}.tar.xz"
          curl -sL --fail -o tarball.tar.xz "$url"
          tar -xJf tarball.tar.xz
          mkdir -p staging
          find . -name tmnl -type f -executable -not -path './staging/*' -not -path './.git/*' | head -1 | xargs -I{} cp {} staging/tmnl
          chmod +x staging/tmnl
          ls -la staging/

      - name: Install nfpm
        run: |
          curl -sL --fail -o nfpm.tar.gz "https://github.com/goreleaser/nfpm/releases/download/v2.40.0/nfpm_2.40.0_Linux_x86_64.tar.gz"
          mkdir -p .nfpm-bin
          tar -xzf nfpm.tar.gz -C .nfpm-bin nfpm
          chmod +x .nfpm-bin/nfpm
          .nfpm-bin/nfpm --version

      - name: Build .deb + .rpm
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          # Versionless filenames so `releases/latest/download/<name>` is stable
          # across releases (matches cargo-dist's tarball naming convention).
          .nfpm-bin/nfpm pkg --config nfpm/tmnl.yaml --packager deb --target "tmnl-rs-${{ matrix.triple }}.deb"
          .nfpm-bin/nfpm pkg --config nfpm/tmnl.yaml --packager rpm --target "tmnl-rs-${{ matrix.triple }}.rpm"
          ls -la *.deb *.rpm

      - name: Build AppImage
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p AppDir/usr/bin
          cp staging/tmnl AppDir/usr/bin/tmnl
          chmod +x AppDir/usr/bin/tmnl
          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/tmnl" "$@"
          APPRUN
          chmod +x AppDir/AppRun
          cp scripts/linux/tmnl.desktop AppDir/tmnl.desktop
          cp scripts/icon/AppIcon.iconset/icon_256x256.png AppDir/tmnl.png

          # appimagetool needs FUSE — not available in GHA. Extract first.
          curl -sL --fail -o appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          ./appimagetool --appimage-extract > /dev/null

          # Per-arch runtime so the AppImage can be ARM64 even though
          # the build host is x86_64.
          runtime_arch="${{ matrix.rpm_arch }}"
          curl -sL --fail -o runtime "https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-${runtime_arch}"
          chmod +x runtime

          ARCH="${runtime_arch}" ./squashfs-root/AppRun \
            --runtime-file=runtime \
            AppDir "tmnl-rs-${{ matrix.triple }}.AppImage"
          ls -la *.AppImage

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          v="${{ steps.ver.outputs.version }}"
          gh release upload "v${v}" \
            "tmnl-rs-${{ matrix.triple }}.deb" \
            "tmnl-rs-${{ matrix.triple }}.rpm" \
            "tmnl-rs-${{ matrix.triple }}.AppImage" \
            --clobber
