name: Auto-PR to winget-pkgs

# Triggered when a release is published in this repo. Files a PR
# against microsoft/winget-pkgs adding new manifests for the latest
# version's .msi installers.
#
# Setup is shared across the family (mnml / mixr / tmnl) — same fork
# (chris-mclennan/winget-pkgs), same WINGET_TOKEN PAT, just need the
# secret added to each repo's settings. CLA was signed during the
# first manual submission (microsoft/winget-pkgs#382317) and Microsoft
# remembers per-user, so the bot won't re-prompt on auto-PRs.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish to winget (e.g. 0.0.5, no leading v)"
        required: true

jobs:
  winget:
    runs-on: ubuntu-latest
    steps:
      - name: Publish to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: ChrisMcLennan.tmnl
          version: ${{ inputs.version || github.event.release.tag_name }}
          installers-regex: '\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}
