name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: fmt · clippy · test
    # tmnl is macOS-only (native menu bar + .app bundle).
    runs-on: macos-latest
    steps:
      # tmnl depends on sibling crates by path (../tmnl-protocol, ../fim-engine),
      # so check them out alongside this repo for the path deps to resolve.
      - name: Checkout tmnl
        uses: actions/checkout@v4
        with:
          path: tmnl
      - name: Checkout tmnl-protocol
        uses: actions/checkout@v4
        with:
          repository: chris-mclennan/tmnl-protocol
          path: tmnl-protocol
      - name: Checkout fim-engine
        uses: actions/checkout@v4
        with:
          repository: chris-mclennan/fim-engine
          path: fim-engine

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tmnl

      - name: rustfmt
        working-directory: tmnl
        run: cargo fmt --all --check

      - name: clippy
        working-directory: tmnl
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        working-directory: tmnl
        run: cargo test
