# Injected by `dist` into every build job's `steps:` array, before
# the actual build runs. Handles two things cargo-dist's default
# workflow doesn't:
#
#  (1) Clones tmnl's private sibling repos to the layout that
#      tmnl's `Cargo.toml` path-deps expect (`../tmnl-protocol`,
#      `../fim-engine`). Once those repos are public the
#      `SIBLING_CHECKOUT_TOKEN` secret can be dropped.
#
#  (2) Installs the Linux system libs that `winit`, `wgpu`, and
#      `muda` (native menu bar — pulls in atk-sys / gtk-sys)
#      build-time depend on. macOS + Windows runners have these
#      bundled already; only Linux needs the apt-get step.

- name: Clone private sibling repos
  shell: bash
  env:
    GH_TOKEN: ${{ secrets.SIBLING_CHECKOUT_TOKEN }}
  run: |
    set -euo pipefail
    cd ..
    if [ ! -d tmnl-protocol ]; then
      git clone --depth=1 \
        "https://x-access-token:${GH_TOKEN}@github.com/chris-mclennan/tmnl-protocol.git"
    fi
    if [ ! -d fim-engine ]; then
      git clone --depth=1 \
        "https://x-access-token:${GH_TOKEN}@github.com/chris-mclennan/fim-engine.git"
    fi

- name: Install Linux build deps
  if: runner.os == 'Linux'
  shell: bash
  run: |
    sudo apt-get update
    sudo apt-get install -y \
      libx11-dev libxcursor-dev libxrandr-dev libxi-dev libxkbcommon-dev \
      libgl1-mesa-dev libwayland-dev libudev-dev libfontconfig1-dev pkg-config \
      libglib2.0-dev libgtk-3-dev libxdo-dev
