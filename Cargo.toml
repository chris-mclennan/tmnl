[package]
name = "tmnl-rs"
version = "0.0.4"
edition = "2024"
rust-version = "1.85"
description = "A GPU-rendered terminal for macOS â€” and a structured-cell display surface that apps can draw to directly."
authors = ["Chris McLennan"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/chris-mclennan/tmnl"
homepage = "https://github.com/chris-mclennan/tmnl"
documentation = "https://docs.rs/tmnl-rs"
readme = "README.md"
keywords = ["terminal", "wgpu", "gpu", "macos", "tui"]
categories = ["gui", "command-line-utilities"]
exclude = [".local/", ".claude/", ".github/", "assets/", "scripts/"]

[package.metadata.wix]
upgrade-guid = "681C59FB-950F-42B0-999A-89E5ED497228"
path-guid = "B3861F1C-5533-4494-980A-3431529D7A2F"
license = false
eula = false

# The crate publishes as `tmnl-rs` (the bare `tmnl` name was unavailable),
# but the binary stays `tmnl` â€” `cargo install tmnl-rs` gives you `tmnl`.
[[bin]]
name = "tmnl"
path = "src/main.rs"

[dependencies]
winit = "0.30"
wgpu = "23"
pollster = "0.4"
env_logger = "0.11"
log = "0.4"
fontdue = "0.9"
bytemuck = { version = "1", features = ["derive"] }
tmnl-protocol = { path = "../tmnl-protocol", version = "0.0.2" }
# Embedded local AI command completion (qwen2.5-coder via candle). Kept
# as its own crate so candle's large dependency tree compiles once and
# tmnl's incremental rebuilds don't recompile it. First build is slow.
# Default-features off to drop the `metal` feature (Apple GPU via objc2),
# re-enabled via the per-target block below only on macOS â€” keeps Linux
# and Windows builds from pulling in a transitively Apple-only graph.
fim-engine = { path = "../fim-engine", version = "0.1.0", default-features = false }
# Shell mode â€” host a real pty + parse its output into cells. Versions match
# what mnml's pty_pane uses so we share one source-of-truth in the workspace.
vt100 = "0.16"
portable-pty = "0.8"
# Native macOS menu bar (tmnl / Shell / Edit / View / Window / Help).
# Same crate version as mixr so we share one source-of-truth.
muda = "0.16"
# Embedded WebView for `PaneKind::Browser` (split-pane web view).
# Same version mixr uses for its Beatport login WebView â€” keeps the
# family on one wry across the workspace. `build_as_child` (wry 0.45+)
# mounts a WKWebView/WebKitGTK/WebView2 as a sub-region of an existing
# winit window using its raw window handle. Linux deps:
# libwebkit2gtk-4.1-dev + libsoup-3.0-dev (added to release CI in a
# follow-up); macOS + Windows pull their webviews from the OS.
wry = "0.45"
# Bridges winit â†” wry: we hand wry the parent window's
# `RawWindowHandle` (the winit window) so it knows where to mount the
# child WebView.
raw-window-handle = "0.6"
# Config persistence â€” `~/.config/tmnl/config.toml`.
toml = { version = "0.8", default-features = false, features = ["parse", "display"] }
# Background "is there a newer release?" probe (src/update_check.rs).
# Blocking + lightweight â€” avoid pulling in async runtimes just for one
# GET on launch. `tls` covers HTTPS via rustls.
ureq = { version = "2.10", default-features = false, features = ["tls"] }
serde = { version = "1", features = ["derive"] }
dirs = "6"
# Used by the pty-fd handoff receiver â€” `ioctl(TIOCSWINSZ)` on adopted
# pty masters (resizing them via portable-pty's MasterPty trait isn't
# possible because we don't construct the master, we adopt it from the
# sender). Unix-only; tmnl is mac-first anyway.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

# Windows AF_UNIX support â€” Windows 10 (build 17063, late 2017) and
# newer have native AF_UNIX, but Rust's `std::os::unix::net::*` is
# gated to `cfg(unix)`. `uds_windows` wraps the Windows winapi calls
# behind a `UnixListener` / `UnixStream` API that matches std's
# shape, so `server.rs` can stay one code path: file-path-addressed
# sockets on every platform.
[target.'cfg(windows)'.dependencies]
uds_windows = "1.1"

# Apple GPU inference path for fim-engine â€” opted into only on macOS so
# Linux + Windows builds compile without the `objc2` Apple-only crate
# graph (candle-core/metal pulls that in).
[target.'cfg(target_os = "macos")'.dependencies]
fim-engine = { path = "../fim-engine", version = "0.1.0", features = ["metal"] }

[dev-dependencies]
# Sandboxed temp dirs for tests that touch `$HOME` / `$XDG_CONFIG_HOME`
# â€” used by `shell_prompt::tests` to avoid littering the real
# `~/.config/mnml/`.
tempfile = "3"

[profile.release]
lto = "thin"
codegen-units = 1

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
